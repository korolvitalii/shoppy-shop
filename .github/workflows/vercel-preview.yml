name: Vercel Preview

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build and deploy preview
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview settings
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel preview
        run: vercel build --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          deployment_url="$(vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Verify preview access
        run: |
          if [ -z "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            echo "::error::VERCEL_AUTOMATION_BYPASS_SECRET is not configured."
            exit 1
          fi

          final_url="$(curl \
            --fail \
            --location \
            --silent \
            --show-error \
            --output /dev/null \
            --write-out "%{url_effective}" \
            --header "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            --header "x-vercel-set-bypass-cookie: true" \
            "${{ steps.deploy.outputs.url }}/en/products")"

          if [[ "$final_url" == https://vercel.com/login* ]]; then
            echo "::error::Vercel Deployment Protection was not bypassed."
            exit 1
          fi
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Audit deployed SEO
        run: |
          node -e "require('node:fs').writeFileSync(process.env.LIGHTHOUSE_HEADERS_PATH, JSON.stringify({'x-vercel-protection-bypass': process.env.VERCEL_AUTOMATION_BYPASS_SECRET, 'x-vercel-set-bypass-cookie': 'true'}))"
          npx --yes @lhci/cli@0.15.1 autorun \
            --collect.url="${{ steps.deploy.outputs.url }}/en/products" \
            --collect.settings.extraHeaders="$LIGHTHOUSE_HEADERS_PATH"
        env:
          LIGHTHOUSE_HEADERS_PATH: ${{ runner.temp }}/lighthouse-headers.json
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

<main class="checkout">
  <app-checkout-stepper
    [currentStep]="1"
    [deliveryComplete]="facade.delivery() !== null"
    [paymentComplete]="facade.paymentToken() !== null"
  />
  <h1>Delivery details</h1>
  <form [formGroup]="form" (submit)="continue($event)" novalidate>
    @for (field of ['name', 'email', 'address', 'city', 'postcode', 'country']; track field) {
      <label [for]="field"
        >{{ field
        }}<input
          [id]="field"
          [type]="field === 'email' ? 'email' : 'text'"
          [formControlName]="$any(field)"
        />
        @if (form.get(field)?.touched && form.get(field)?.invalid) {
          <span>{{ field === 'name' ? 'Name is required' : 'Enter a valid ' + field }}</span>
        }
      </label>
    }
    <div class="checkout-actions">
      <a class="secondary-action" routerLink="/basket">Back to basket</a>
      <button type="submit">Continue to payment</button>
    </div>
  </form>
</main>

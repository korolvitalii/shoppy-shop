<main class="checkout">
  <app-checkout-stepper
    [currentStep]="1"
    [deliveryComplete]="facade.delivery() !== null"
    [paymentComplete]="facade.paymentToken() !== null"
  />
  <h1 i18n="@@deliveryDetails">Delivery details</h1>
  <p class="page-intro" i18n="@@deliveryIntro">Tell us where your order should arrive.</p>
  <form [formGroup]="form" (submit)="continue($event)" novalidate>
    <div class="form-heading">
      <span aria-hidden="true">01</span>
      <div>
        <h2 i18n="@@contactInformation">Contact information</h2>
        <p i18n="@@contactInformationDetail">We’ll use these details for delivery updates.</p>
      </div>
    </div>
    <label for="name">
      <span i18n="@@fullName">Full name</span>
      <input
        id="name"
        autocomplete="name"
        formControlName="name"
        placeholder="Alex Morgan"
        [attr.aria-invalid]="form.controls.name.touched && form.controls.name.invalid"
      />
      @if (form.controls.name.touched && form.controls.name.invalid) {
        <span i18n="@@nameRequired">Name is required</span>
      }
    </label>
    <label for="email">
      <span i18n="@@emailAddress">Email address</span>
      <input
        id="email"
        type="email"
        autocomplete="email"
        formControlName="email"
        placeholder="alex@example.com"
        [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid"
      />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span i18n="@@emailInvalid">Enter a valid email address.</span>
      }
    </label>
    <div class="form-heading form-heading--address">
      <span aria-hidden="true">02</span>
      <div>
        <h2 i18n="@@deliveryAddress">Delivery address</h2>
        <p i18n="@@deliveryAddressDetail">
          Choose an address where someone can receive the parcel.
        </p>
      </div>
    </div>
    <label class="full-width" for="address">
      <span i18n="@@streetAddress">Street address</span>
      <input
        id="address"
        autocomplete="street-address"
        formControlName="address"
        placeholder="4 Market Street"
        [attr.aria-invalid]="form.controls.address.touched && form.controls.address.invalid"
      />
      @if (form.controls.address.touched && form.controls.address.invalid) {
        <span i18n="@@addressRequired">Address is required</span>
      }
    </label>
    <label for="city">
      <span i18n="@@city">City</span>
      <input
        id="city"
        autocomplete="address-level2"
        formControlName="city"
        placeholder="London"
        [attr.aria-invalid]="form.controls.city.touched && form.controls.city.invalid"
      />
      @if (form.controls.city.touched && form.controls.city.invalid) {
        <span i18n="@@cityRequired">City is required</span>
      }
    </label>
    <label for="postcode">
      <span i18n="@@postcode">Postcode</span>
      <input
        id="postcode"
        autocomplete="postal-code"
        formControlName="postcode"
        placeholder="SW1A 1AA"
        [attr.aria-invalid]="form.controls.postcode.touched && form.controls.postcode.invalid"
      />
      @if (form.controls.postcode.touched && form.controls.postcode.invalid) {
        <span i18n="@@postcodeInvalid">Enter a valid postcode</span>
      }
    </label>
    <label class="full-width" for="country">
      <span i18n="@@country">Country</span>
      <select id="country" autocomplete="country-name" formControlName="country">
        <option i18n="@@countryUnitedKingdom">United Kingdom</option>
        <option i18n="@@countryIreland">Ireland</option>
        <option i18n="@@countryFrance">France</option>
        <option i18n="@@countryGermany">Germany</option>
        <option i18n="@@countrySpain">Spain</option>
      </select>
    </label>
    <div class="checkout-actions">
      <button type="submit" i18n="@@continuePayment">Continue to payment</button>
    </div>
  </form>
</main>

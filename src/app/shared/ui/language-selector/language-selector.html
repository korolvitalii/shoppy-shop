<label [class.wide]="wide()">
  <span [class.visually-hidden]="!wide()" i18n="@@languageSelector">Language</span>
  <select
    [value]="locale.currentLocale"
    (change)="changeLocale($event)"
    aria-label="Language"
    i18n-aria-label="@@languageSelector"
  >
    @for (option of locales; track option.locale) {
      <option [value]="option.locale">
        {{ wide() ? option.label : option.shortLabel }}
      </option>
    }
  </select>
</label>

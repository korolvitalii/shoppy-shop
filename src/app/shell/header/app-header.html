<header class="site-header">
  <a class="skip-link" href="#main-content">Skip to content</a>
  <div class="header-inner">
    <a class="brand" routerLink="/products" aria-label="ShoppyShop home">ShoppyShop</a>

    <nav class="desktop-navigation" aria-label="Primary navigation">
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/basket" routerLinkActive="active">
        Basket
        @if (basket.itemCount() > 0) {
          <span class="badge" aria-label="Basket items">{{
            basket.itemCount() > 99 ? '99+' : basket.itemCount()
          }}</span>
        }
      </a>
      <button class="logout" type="button" (click)="logout()">Log out</button>
    </nav>

    <a class="basket-shortcut" routerLink="/basket" aria-label="Open basket">
      <span aria-hidden="true">Bag</span>
      @if (basket.itemCount() > 0) {
        <span class="badge">{{ basket.itemCount() > 99 ? '99+' : basket.itemCount() }}</span>
      }
    </a>

    <button
      class="menu-button"
      type="button"
      aria-label="Toggle navigation"
      aria-controls="mobile-navigation"
      [attr.aria-expanded]="menuOpen()"
      (click)="toggleMenu()"
    >
      <span></span><span></span><span></span>
    </button>
  </div>

  @if (menuOpen()) {
    <nav id="mobile-navigation" class="mobile-navigation" aria-label="Mobile navigation">
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/basket" routerLinkActive="active">
        Basket <span>{{ basket.itemCount() }} items</span>
      </a>
      <button class="mobile-logout" type="button" (click)="logout()">Log out</button>
    </nav>
  }
</header>

<nav class="mobile-tabs" aria-label="Mobile primary navigation">
  <a routerLink="/products" routerLinkActive="active">
    <span class="tab-icon" aria-hidden="true">⌂</span>
    <span>Shop</span>
  </a>
  <a routerLink="/basket" routerLinkActive="active">
    <span class="tab-icon" aria-hidden="true">▱</span>
    <span>Basket</span>
    @if (basket.itemCount() > 0) {
      <span class="badge" aria-label="Basket items">{{
        basket.itemCount() > 99 ? '99+' : basket.itemCount()
      }}</span>
    }
  </a>
</nav>

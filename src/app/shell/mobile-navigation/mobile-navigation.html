<nav
  class="mobile-tabs"
  [class.mobile-tabs--authenticated]="session.isAuthenticated()"
  aria-label="Mobile primary navigation"
>
  <a routerLink="/products" routerLinkActive="active">
    <span class="tab-icon" aria-hidden="true">⌂</span>
    <span>Shop</span>
  </a>
  <a routerLink="/favorites" routerLinkActive="active">
    <span class="tab-icon" aria-hidden="true">♡</span>
    <span>Favourites</span>
    @if (favorites.count() > 0) {
      <span class="badge" aria-label="Favourite products">{{
        favorites.count() > 99 ? '99+' : favorites.count()
      }}</span>
    }
  </a>
  @if (session.isAuthenticated()) {
    <a routerLink="/orders" routerLinkActive="active">
      <span class="tab-icon" aria-hidden="true">◷</span>
      <span>Orders</span>
    </a>
    <a routerLink="/basket" routerLinkActive="active">
      <span class="tab-icon" aria-hidden="true">▱</span>
      <span>Basket</span>
      @if (basket.itemCount() > 0) {
        <span class="badge" aria-label="Basket items">{{
          basket.itemCount() > 99 ? '99+' : basket.itemCount()
        }}</span>
      }
    </a>
  }
</nav>
